@if (card(); as cardItem) {
  <nz-card class="modern-card" (click)="onNavigate()">
    <div class="main-body">
      <div class="icon-box">
        <nz-icon nzType="appstore" nzTheme="outline" />
      </div>
      <div class="main-content">
        <div class="title">{{ cardItem.name }}</div>
        <div class="sub-title">Bản ghi: {{ cardItem.record }}</div>
      </div>
    </div>
  </nz-card>
}
