<div class="account-overview">
  <div class="account-overview__stat">
    @for (card of statCardList(); track card) {
      <app-stat-card [card]="card" />
    }
  </div>

  <div class="account-overview__content">
    <nz-card class="account-overview__chart" nzTitle="Lượng tuy cập trong ngày">
      <canvas
        baseChart
        [data]="lineChartData()"
        [options]="lineChartOptions"
        [type]="lineChartType"
      ></canvas>
    </nz-card>
    <nz-card class="account-overview__logs" nzTitle="Lịch sử hoạt động trong ngày"></nz-card>
  </div>
</div>
